<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATG電子 VIP預測系統 | 免費體驗版</title>

<!-- 🎰 自動載入雲端資料庫核心 SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* --- 尊榮 VIP 黑金奢華配色 --- */
:root {
  --primary: #FFD700;    /* 奢華金 */
  --secondary: #ffaa00;  /* 財富橘 */
  --danger: #ff3b3b;     /* 好運紅 */
  --success: #00e676;    /* 狀態綠 */
  --bg-dark: #0a0505;
  --card-bg: rgba(25, 10, 10, 0.75);
}

body {
  background: linear-gradient(rgba(15, 5, 5, 0.85), rgba(5, 2, 2, 0.95)),
              url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2070&auto=format&fit=crop') center/cover fixed;
  color: #fdf5e6;
  font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  min-height: 100vh;
}

.marquee-container {
  background: rgba(255, 215, 0, 0.1);
  border-bottom: 1px solid rgba(255, 215, 0, 0.3);
  padding: 10px 0;
  font-size: 14px;
  color: var(--primary);
  overflow: hidden;
  position: relative;
  backdrop-filter: blur(8px);
}

.marquee-content {
  display: inline-block;
  white-space: nowrap;
  animation: marquee 30s linear infinite;
}

@keyframes marquee {
  0% { transform: translate3d(50%, 0, 0); }
  100% { transform: translate3d(-100%, 0, 0); }
}

.marquee-content span {
  margin-right: 50px;
  background: rgba(0, 0, 0, 0.6);
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid rgba(255, 215, 0, 0.3);
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
}

h1 {
  color: #ffffff;
  font-size: 1.6rem;
  margin: 30px 0 10px 0;
  letter-spacing: 2px;
  text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.atg-brand {
  background: linear-gradient(to bottom, #FFF3E0, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  font-weight: 900;
}

.badges { display: flex; gap: 10px; justify-content: center; }

.badge-free {
  display: inline-block;
  background: linear-gradient(135deg, #ff3b3b, #d32f2f);
  color: white;
  font-size: 0.85rem;
  padding: 5px 12px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(255, 59, 59, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.badge-count {
  display: inline-block;
  background: linear-gradient(135deg, #00c853, #009624);
  color: white;
  font-size: 0.85rem;
  padding: 5px 12px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(0, 200, 83, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: all 0.3s;
}

#online {
  font-size: 14px;
  color: #d4af37;
  margin-bottom: 25px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
  letter-spacing: 1px;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 215, 0, 0.2);
  border-top: 1px solid rgba(255, 215, 0, 0.4);
  border-radius: 20px;
  padding: 30px;
  margin: 20px auto;
  max-width: 600px;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(255, 215, 0, 0.03);
  transition: all 0.4s ease;
  position: relative;
  z-index: 10;
}

input {
  background: rgba(0, 0, 0, 0.7);
  color: #FFD700;
  padding: 14px 20px;
  margin: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 215, 0, 0.3);
  width: calc(100% - 70px);
  font-size: 16px;
  transition: 0.3s;
}

input::placeholder { color: #888; }
input:focus {
  outline: none;
  border-color: var(--primary);
  background: rgba(255, 215, 0, 0.05);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
}

button {
  background: linear-gradient(135deg, #FFDF00, #DAA520, #B8860B);
  color: #111;
  padding: 14px 30px;
  margin: 15px 10px;
  border-radius: 30px;
  border: 1px solid #FFED4A;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(218, 165, 32, 0.4);
  transition: all 0.3s ease;
  letter-spacing: 1px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(218, 165, 32, 0.6);
  background: linear-gradient(135deg, #FFF05A, #E8B923, #C99718);
}

.btn-secondary {
  background: linear-gradient(135deg, #444, #222);
  color: #FFD700;
  border: 1px solid #555;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
}
.btn-secondary:hover {
  background: linear-gradient(135deg, #555, #333);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
}

/* 💰 顯眼的本金調整按鈕特效 */
.btn-balance {
  background: linear-gradient(135deg, #00e676, #00a040);
  color: #000;
  border: 1px solid #b2ff59;
  font-weight: 900;
  box-shadow: 0 0 15px rgba(0, 230, 118, 0.5);
  animation: pulse-balance 1.5s infinite alternate;
  cursor: pointer;
  border-radius: 8px;
}
.btn-balance:hover {
  background: linear-gradient(135deg, #1aff8c, #00c853);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 230, 118, 0.8);
}
@keyframes pulse-balance {
  0% { box-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
  100% { box-shadow: 0 0 25px rgba(0, 230, 118, 0.8); }
}

/* 🎨 全新圖片選單卡片樣式 */
.game-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }

.game-card {
  flex: 1 1 130px;
  max-width: 150px;
  background: rgba(10, 5, 5, 0.9);
  border: 2px solid rgba(255, 215, 0, 0.2);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  box-shadow: 0 5px 15px rgba(0,0,0,0.8);
}

.game-card:hover {
  transform: translateY(-8px) scale(1.03);
  border-color: var(--primary);
  box-shadow: 0 12px 25px rgba(255, 215, 0, 0.3);
}

.game-card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.game-card:hover img {
  transform: scale(1.08);
}

.game-card .game-name {
  padding: 10px 0;
  font-weight: 900;
  color: #fff;
  font-size: 15px;
  background: linear-gradient(to top, rgba(0,0,0,1), rgba(20,5,5,0.9));
  border-top: 1px solid rgba(255, 215, 0, 0.3);
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  letter-spacing: 1px;
}

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }

.roomCard {
  background: rgba(20, 5, 5, 0.85);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 16px;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  position: relative;
}

.roomCard:hover {
  transform: translateY(-5px);
  border-color: var(--primary);
  background: rgba(255, 215, 0, 0.08);
  box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
}

.best {
  border: 1px solid var(--danger);
  background: linear-gradient(180deg, rgba(30, 5, 5, 0.9), rgba(255, 59, 59, 0.15));
}

.rate-num {
  font-size: 24px;
  font-weight: 900;
  color: var(--primary);
  margin: 8px 0;
  text-shadow: 0 0 10px rgba(255,215,0,0.3);
}
.best .rate-num {
  color: var(--danger);
  text-shadow: 0 0 10px rgba(255,59,59,0.5);
}

.room-meta { font-size: 12px; color: #b0a090; margin-top: 4px; }

.loading-box { padding: 40px 0; }
.scanner {
  width: 80%; margin: 0 auto; height: 2px; background: var(--primary);
  box-shadow: 0 0 20px var(--primary); animation: scan 1.5s infinite ease-in-out;
}
@keyframes scan {
  0% { transform: translateY(-15px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(35px); opacity: 0; }
}
.loading-text { font-weight: bold; color: var(--primary); letter-spacing: 2px; animation: blink 1.5s infinite; margin-top: 25px; }
@keyframes blink { 50% { opacity: 0.5; } }

.strategy-box { background: rgba(0,0,0,0.7); border-radius: 12px; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,215,0,0.1); }
.strategy { text-align: left; margin: 12px 0; padding: 10px 15px; background: rgba(255,215,0,0.03); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; font-size: 14.5px; line-height: 1.6; color: #eee; }
.strategy.high-alert { border-left-color: var(--danger); background: rgba(255, 59, 59, 0.08); }

.btn-line-upgrade {
  background: linear-gradient(135deg, #00c300, #009900);
  border-color: #00e600;
  color: #fff;
  width: 80%;
  font-size: 18px;
  padding: 16px;
  box-shadow: 0 0 20px rgba(0, 195, 0, 0.5);
  animation: pulse-line 1.5s infinite alternate;
}
.btn-line-upgrade:hover {
  background: linear-gradient(135deg, #00e600, #00c300);
  box-shadow: 0 0 30px rgba(0, 195, 0, 0.8);
}

@keyframes pulse-line {
  0% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 195, 0, 0.4); }
  100% { transform: scale(1.03); box-shadow: 0 0 25px rgba(0, 195, 0, 0.8); }
}
</style>
</head>

<body>

<div class="marquee-container">
  <div class="marquee-content" id="marqueeText">
    <span>系統初始化中...</span>
  </div>
</div>

<h1>
  <span>🎰 <span class="atg-brand">ATG電子</span> VIP預測系統</span>
  <div class="badges">
    <span class="badge-free">免費體驗版</span>
    <span class="badge-count" id="trialCounterUI">剩餘分析: 讀取中</span>
  </div>
</h1>
<p id="online">大數據分析伺服器連線中...</p>

<div id="loginArea">
  <div class="card">
    <h2 style="color: var(--primary); margin-top: 0;">啟動預測模型</h2>
    <p style="font-size: 15px; color: var(--success); font-weight: bold; margin-bottom: 5px;">✔️ 免費體驗無須登入</p>
    <p style="font-size: 13px; color: #b0a090; margin-bottom: 20px;">免費版提供基礎數據走勢參考</p>
    <input id="money" type="number" placeholder="輸入預估起始金額（最低1000）">
    <button onclick="enterSystem()" style="width: calc(100% - 50px);">進行快速運算</button>
  </div>
</div>

<div id="games"></div>
<div id="gamePage"></div>

<script>
// ===================================================
// ⚙️ 👇 專屬 Supabase 金鑰 👇
// ===================================================
const SUPABASE_URL = "https://igefpbxlchcevyqirwiw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_HyDUEy0WqtjMns_YlV-z6w_8hfu9zqY";
// ===================================================

// 🎯 1. 遊戲列表：綁定你上傳的專屬圖示檔案
const games = [
  { name: "戰神賽特2", img: "zh-tw.jpg" },
  { name: "巴風特", img: "game_icon.webp" },
  { name: "戰神賽特", img: "game_icon (1).webp" },
  { name: "赤三國", img: "赤三國gameLogo.webp" }
];

// 💾 2. 讀取變數
let currentPlayer = "體驗版訪客";
let balance = 0;
let currentGame = "";
let currentTrialsLeft = 0; 
const MAX_TRIAL = 2; 

// 🛡️ 初始化資料庫連線
let _db = null;
try {
  if (SUPABASE_URL.startsWith("https://")) {
    _db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch (e) {
  console.error("⚠️ 資料庫初始化失敗:", e);
}

// 🎯 生成追蹤影子 ID
let deviceId = localStorage.getItem('atg_device_id');
if (!deviceId) {
  deviceId = 'dev_' + Math.random().toString(36).substring(2, 15);
  localStorage.setItem('atg_device_id', deviceId);
}

// ⚡ 與雲端同步玩家次數
async function syncUserTrials() {
  if(!_db) return;
  try {
    const { data, error } = await _db.from('atg_users').select('trials_left').eq('device_id', deviceId).maybeSingle();
    if (data) {
      currentTrialsLeft = data.trials_left;
    } else {
      currentTrialsLeft = 2; 
      await _db.from('atg_users').insert([{ device_id: deviceId, trials_left: 2 }]);
    }
    updateTrialCounterUI();
  } catch (e) {
    console.error("同步次數失敗", e);
  }
}
syncUserTrials(); 

function updateTrialCounterUI() {
  let counterEl = document.getElementById('trialCounterUI');
  if (currentTrialsLeft > 0) {
    counterEl.innerText = `剩餘分析: ${currentTrialsLeft} 次`;
    counterEl.style.background = 'linear-gradient(135deg, #00c853, #009624)';
  } else {
    counterEl.innerText = `體驗次數已耗盡`;
    counterEl.style.background = 'linear-gradient(135deg, #757575, #424242)';
    counterEl.style.boxShadow = 'none';
  }
}

// 🎯 非同步上傳數據到雲端後台
async function pushLogToCloud(actionType, roomNo = "", roomRate = 0) {
  if(!_db) return;
  try {
    await _db.from('atg_logs').insert([
      {
        player_name: currentPlayer,
        balance: balance || 0,
        game_name: currentGame || actionType,
        room_no: roomNo || actionType,
        rate: roomRate,
        device_id: deviceId
      }
    ]);
  } catch (err) {}
}

function updateMarquee() {
  let content = "";
  for(let i=0; i<5; i++) {
    const name = Math.random().toString(36).substring(2,6).toUpperCase();
    const game = games[Math.floor(Math.random()*games.length)].name;
    const score = Math.floor(Math.random()*1500) + 100;
    content += `<span>🎊 恭喜！玩家 ${name} 在【${game}】贏得 ${score}x 爆發獎勵！</span>`;
  }
  document.getElementById("marqueeText").innerHTML = content;
}
updateMarquee();
setInterval(updateMarquee, 12000);

function updateOnlineCount() {
  const baseCount = 580;
  const randomOffset = Math.floor(Math.random() * 50) - 25;
  document.getElementById("online").innerText = "📡 VIP 頻道當前在線人數：" + (baseCount + randomOffset) + " 人";
}
updateOnlineCount();
setInterval(updateOnlineCount, 3000);

// 💰 調整本金功能：直接彈窗修改
function adjustBalance() {
  let newMoney = prompt("請輸入新的預估起始金額（最低 1000）：", balance);
  if (newMoney !== null) {
    let rawStr = newMoney.trim();
    if (rawStr === "" || isNaN(rawStr)) {
      alert("❌ 修改失敗：請輸入正確金額");
      return;
    }
    let parsed = parseInt(rawStr);
    if (parsed >= 1000) {
      balance = parsed;
      localStorage.setItem('atg_player_balance', balance); 
      alert("✅ 本金已成功更新為：$" + balance.toLocaleString());
      loadGameList(); 
    } else {
      alert("❌ 修改失敗：起始金額請輸入 1000 以上");
    }
  }
}

function enterSystem(){
  let rawInput = document.getElementById("money").value.trim();
  if(rawInput === "" || isNaN(rawInput)) {
    return alert("請輸入正確金額");
  }
  balance = parseInt(rawInput);
  if(balance < 1000) {
    return alert("起始金額請輸入 1000 以上");
  }
  localStorage.setItem('atg_player_balance', balance);

  document.getElementById("loginArea").innerHTML = `
    <div class='card loading-box'>
      <div class='scanner'></div>
      <p class='loading-text'>⏳ 正在載入 ATG 基礎分析模組，請稍後...</p>
    </div>
  `;
  setTimeout(showStrategy, 1500);
}

function showStrategy(){
  let stopLoss = Math.floor(balance * 0.25); 
  let takeProfit = Math.floor(balance * 6.75);
  let advice = balance >= 10000 ? "💰 資金狀態：充足。建議採取穩健推進策略，分配波段操作。" : balance >= 5000 ? "⚖️ 資金狀態：中等。適合執行階梯式微調打法。" : "🛡 資金狀態：保守。建議使用較低籌碼觀察開獎週期。";

  document.getElementById("loginArea").innerHTML = `
    <div class='card'>
      <h2>✅ 參數設定完成</h2>
      <p style="color:var(--secondary)">當前狀態：體驗版訪客</p>
      <p>帶入金額：$${balance.toLocaleString()}</p>
      <div class="strategy" style="border-left-color:var(--secondary);">
        ${advice} <br><br>
        <strong style="color:var(--success);">📈 系統建議最高停利點：$${takeProfit.toLocaleString()}</strong><br>
        <strong style="color:var(--danger);">📉 系統建議停損點：$${stopLoss.toLocaleString()}</strong><br><br>
        <span style="font-size:12px; color:#ff3b3b;">* 每次進行「單一房間深度解析」將扣除 1 次體驗額度。</span>
      </div>
      <button onclick="loadGameList()" style="width:80%; margin-top:20px;">進入 ATG 遊戲大廳</button>
    </div>
  `;
  pushLogToCloud("玩家登入系統");
}

function loadGameList(){
  document.getElementById("loginArea").innerHTML = "";
  document.getElementById("gamePage").innerHTML = ""; 
  
  const gameCards = games.map(g => `
    <div class="game-card" onclick="openGame('${g.name}')">
      <div style="width: 100%; overflow: hidden;">
        <img src="${g.img}" alt="${g.name}">
      </div>
      <div class="game-name">${g.name}</div>
    </div>
  `).join("");

  document.getElementById("games").innerHTML = `
    <div class='card'>
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <h2 style="margin-top:0;">🎯 選擇分析對象</h2>
        <button onclick="adjustBalance()" class="btn-balance" style="margin:0; padding:8px 15px; font-size:14px; width:auto;">💰 調整本金</button>
      </div>
      <p style="font-size:13.5px; color:#b0a090; text-align:left; margin-top:5px;">
        目前分析本金：<strong style="color:var(--primary)">$${balance.toLocaleString()}</strong><br>
        體驗版提供近期波動度與基礎爆分率估算。
      </p>
      <div class="game-grid">${gameCards}</div>
    </div>
  `;
}

function generateRooms(){
  let rooms = [];
  const statusPool = ["活躍中", "蓄勢期", "平穩期", "觀察期"];
  let selectedRooms = [];
  while(selectedRooms.length < 6) {
    let rNum = Math.floor(Math.random() * 3499) + 1;
    let formatted = String(rNum).padStart(3, '0');
    if(!selectedRooms.includes(formatted)) selectedRooms.push(formatted);
  }
  for(let i = 0; i < 6; i++){ 
    const rate = 30 + Math.floor(Math.random() * 60); 
    const volatility = rate > 75 ? "高波動" : "一般";
    const status = rate > 80 ? "🔥 訊號增強" : statusPool[i % statusPool.length];
    rooms.push({ room: selectedRooms[i], rate, volatility, status });
  }
  rooms.sort((a, b) => b.rate - a.rate);
  let html = "<div class='grid'>";
  rooms.forEach((r, i) => {
    const isBest = (i === 0);
    html += `
      <div class='roomCard ${isBest ? 'best' : ''}' onclick="openRoom('${r.room}', ${r.rate})">
        <div style="font-size:13px; color:#b0a090; letter-spacing:1px;">no.${r.room}</div>
        <div class="rate-num">${r.rate}%</div>
        <div style="font-size:12px; font-weight:bold; color:${isBest?'var(--danger)':'var(--secondary)'}">${r.status}</div>
        <div class="room-meta">波動度: ${r.volatility}</div>
      </div>
    `;
  });
  return html + "</div>";
}

function openGame(name){
  currentGame = name;
  document.getElementById("games").innerHTML = "";
  document.getElementById("gamePage").innerHTML = `
    <div class='card loading-box'>
      <div class='scanner' style="background:var(--secondary); box-shadow:0 0 15px var(--secondary);"></div>
      <p class='loading-text' style="color:var(--secondary)">正在同步【${name}】公開數據...</p>
    </div>
  `;
  setTimeout(() => {
    document.getElementById("gamePage").innerHTML = `
      <div class='card' style="max-width: 650px;">
        <h2 style="margin-top:0;">🎰 ${name} 房號列表</h2>
        <p style="font-size:13px; color:#b0a090; margin-top:-5px;">點擊房號將消耗 1 次體驗額度</p>
        ${generateRooms()}
        <br style="clear:both;">
        <button class="btn-secondary" onclick="openGame('${name}')">🔄 重新抓取</button>

function getRandomStrategies(arr, count) {
  let shuffled = [...arr].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
}
